name: Frontend CI

on:
  pull_request:
    branches:
      - main

jobs:
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "package.json not found in frontend directory. Skipping install."
          fi

      - name: Run frontend build/lint (placeholder)
        working-directory: frontend
        run: |
          echo "No build/lint scripts configured yet. Running placeholder check."
          # Once frontend scripts are ready, uncomment the following line:
          # npm run build
